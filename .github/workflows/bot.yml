name: Telegram QR Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # প্রতি 30 মিনিট পর পর (বট সবসময় অ্যাকটিভ রাখতে)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # 30 মিনিটের মধ্যে কাজ শেষ হবে

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (Poppler for PDF conversion)
        run: |
          sudo apt update
          sudo apt install -y poppler-utils ghostscript
          echo "✅ Poppler installed:"
          pdftoppm -v
          echo "✅ Ghostscript installed:"
          gs --version

      - name: Upgrade pip and install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo "📦 Installed packages:"
          pip list

      - name: Check Poppler path
        run: |
          echo "Poppler binary locations:"
          which pdftoppm || echo "❌ pdftoppm not found"
          which pdfinfo || echo "❌ pdfinfo not found"

      - name: Run Telegram Bot (single run)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🚀 Starting bot at $(date)"
          python bot.py
          echo "✅ Bot finished at $(date)"

      - name: Keep workflow alive (fallback)
        if: always()
        run: |
          echo "✅ Workflow completed at $(date)"
          echo "Next run scheduled in 30 minutes"
