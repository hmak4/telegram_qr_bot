name: Telegram QR Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'  # প্রতি ৫ ঘন্টা পর (ঐচ্ছিক)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ⭐⭐⭐ গুরুত্বপূর্ণ অংশ: Poppler ইনস্টল করা ⭐⭐⭐
      - name: Install Poppler (for PDF to Image conversion)
        run: |
          sudo apt update
          sudo apt install -y poppler-utils
          echo "✅ Poppler installed successfully!"
          pdftoppm -v  # ভার্সন দেখাবে, কাজ হয়েছে কিনা নিশ্চিত হবে

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "Starting bot at $(date)"
          python bot.py
