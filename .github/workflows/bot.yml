name: Telegram QR Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # প্রতি ৬ ঘন্টা পর পর রান করবে (বট চালু রাখার জন্য)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # GitHub Actions-এ সর্বোচ্চ ৬ ঘন্টা (360 মিনিট)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # আপডেটেড ভার্সন
          cache: 'pip'  # dependencies ক্যাশ করবে, পরবর্তী রানে দ্রুত হবে

      - name: Install system dependencies (Poppler for PDF conversion)
        run: |
          sudo apt update
          sudo apt install -y poppler-utils
          echo "✅ Poppler installed:"
          pdftoppm -v

      - name: Upgrade pip and install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list  # ইনস্টল হওয়া প্যাকেজের তালিকা দেখার জন্য

      - name: Check Poppler path
        run: |
          which pdftoppm
          ls -la /usr/bin/pdf* || true

      - name: Run Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🚀 Starting bot at $(date)"
          echo "Bot will run for up to 6 hours"
          python bot.py
        continue-on-error: true  # বট ক্র্যাশ হলেও পরবর্তী স্টেপ চলবে

      - name: Keep workflow alive
        if: always()
        run: |
          echo "✅ Bot finished at $(date)"
          echo "Workflow completed successfully"
